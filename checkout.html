<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Ea-Nasir Fine Copper</title>
    <style>
        :root {
            --copper: #B87333;
            --dark: #1a1a1a;
            --light: #f4f4f4;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background-color: var(--light);
        }
        header {
            background: var(--dark);
            color: var(--copper);
            padding: 2rem 1rem;
            text-align: center;
            border-bottom: 4px solid var(--copper);
        }
        .container {
            max-width: 900px;
            margin: 30px auto;
            padding: 0 20px;
        }
        .checkout-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }
        @media (max-width: 768px) {
            .checkout-grid {
                grid-template-columns: 1fr;
            }
        }
        .section {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .section h2 {
            color: var(--copper);
            border-bottom: 2px solid var(--copper);
            padding-bottom: 10px;
        }
        .cart-item {
            display: flex;
            justify-content: space-between;
            padding: 15px 0;
            border-bottom: 1px solid #eee;
            align-items: center;
        }
        .cart-item:last-child {
            border-bottom: none;
        }
        .item-details h3 {
            margin: 0;
            color: var(--dark);
            font-size: 16px;
        }
        .item-quantity {
            color: #666;
            font-size: 14px;
        }
        .item-price {
            color: var(--copper);
            font-weight: bold;
            font-size: 18px;
        }
        .qty-control {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .qty-btn {
            background: var(--copper);
            color: white;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        .qty-btn:hover {
            background: #a0632a;
        }
        .remove-btn {
            background: #ff4444;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }
        .remove-btn:hover {
            background: #cc0000;
        }
        .summary {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
        }
        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 16px;
        }
        .summary-row.total {
            border-top: 2px solid var(--copper);
            padding-top: 10px;
            font-weight: bold;
            font-size: 20px;
            color: var(--copper);
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            color: var(--dark);
            font-weight: bold;
            margin-bottom: 8px;
        }
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-family: inherit;
            box-sizing: border-box;
        }
        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }
        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--copper);
            box-shadow: 0 0 5px rgba(184, 115, 51, 0.3);
        }
        .btn-checkout {
            background: var(--copper);
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: background 0.3s;
        }
        .btn-checkout:hover {
            background: #a0632a;
        }
        .btn-back {
            background: #666;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            margin-bottom: 20px;
        }
        .btn-back:hover {
            background: #444;
        }
        .empty-cart {
            text-align: center;
            padding: 40px 20px;
        }
        .empty-cart p {
            font-size: 18px;
            color: #666;
        }
    </style>
</head>
<body>

<header>
    <h1>🛒 Checkout</h1>
</header>

<div class="container">
    <a href="ea nasir 2.html" class="btn-back">← กลับไปหน้าผลิตภัณฑ์</a>
    
    <div id="empty-state" class="empty-cart" style="display: none;">
        <h2>ตะกร้าว่างเปล่า</h2>
        <p>กรุณาเพิ่มสินค้าในตะกร้าของคุณ</p>
        <a href="ea nasir 2.html" class="btn-back">ไปสั่งซื้อ</a>
    </div>

    <div id="checkout-content">
        <div class="checkout-grid">
            <!-- Cart Items -->
            <div class="section">
                <h2>รายการสั่งซื้อ</h2>
                <div id="cart-items"></div>
                <div class="summary">
                    <div class="summary-row">
                        <span>ราคารวม:</span>
                        <span id="total-price">0 THB</span>
                    </div>
                </div>
            </div>

            <!-- Order Form -->
            <div class="section">
                <h2>ข้อมูลการสั่งซื้อ</h2>
                <form id="order-form" onsubmit="submitOrder(event)">
                    <div class="form-group">
                        <label for="name">ชื่อ-นามสกุล *</label>
                        <input type="text" id="name" name="name" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="email">อีเมล *</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="phone">เบอร์โทรศัพท์ *</label>
                        <input type="tel" id="phone" name="phone" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="address">ที่อยู่ *</label>
                        <textarea id="address" name="address" required></textarea>
                    </div>
                    
                    <div class="form-group">
                        <label for="notes">หมายเหตุ (ถ้ามี)</label>
                        <textarea id="notes" name="notes"></textarea>
                    </div>
                    
                    <button type="submit" class="btn-checkout">ยืนยันการสั่งซื้อ</button>
                </form>
            </div>
        </div>
        
    
        </div>
    </div>
</div>

<script>
    var DebugLog = {
        logs: [],
        maxLogs: 20,
        enabled: false
    };
    
    var cart = JSON.parse(localStorage.getItem('cart')) || [];

    function displayCart() {
        var cartItemsDiv = document.getElementById('cart-items');
        var totalPriceDiv = document.getElementById('total-price');
        var checkoutContent = document.getElementById('checkout-content');
        var emptyState = document.getElementById('empty-state');

        if (cart.length === 0) {
            checkoutContent.style.display = 'none';
            emptyState.style.display = 'block';
            return;
        }

        cartItemsDiv.innerHTML = '';
        var total = 0;

        for (var i = 0; i < cart.length; i++) {
            var item = cart[i];
            var itemTotal = item.price * item.quantity;
            total += itemTotal;

            var cartHTML = '<div class="cart-item"><div class="item-details"><h3>' + item.name + '</h3><div class="item-quantity"><div class="qty-control"><button class="qty-btn" onclick="updateQuantity(' + i + ', -1)">-</button><span>' + item.quantity + '</span><button class="qty-btn" onclick="updateQuantity(' + i + ', 1)">+</button><button class="remove-btn" onclick="removeFromCart(' + i + ')">ลบ</button></div></div></div><div class="item-price">' + itemTotal.toLocaleString() + ' THB</div></div>';
            cartItemsDiv.innerHTML += cartHTML;
        }

        totalPriceDiv.textContent = total.toLocaleString() + ' THB';
    }

    function updateQuantity(index, change) {
        if (cart[index]) {
            cart[index].quantity += change;
            if (cart[index].quantity < 1) {
                cart.splice(index, 1);
            }
            localStorage.setItem('cart', JSON.stringify(cart));
            displayCart();
        }
    }

    function removeFromCart(index) {
        if (confirm('คุณต้องการลบสินค้านี้ออกจากตะกร้าหรือไม่?')) {
            cart.splice(index, 1);
            localStorage.setItem('cart', JSON.stringify(cart));
            displayCart();
        }
    }

    function debugBypass() {
        setTimeout(function() {
            localStorage.removeItem('cart');
            window.location.href = 'prank.html';
        }, 500);
    }

    function submitOrder(event) {
        event.preventDefault();

        var name = document.getElementById('name').value;
        var email = document.getElementById('email').value;
        var phone = document.getElementById('phone').value;
        var address = document.getElementById('address').value;
        var notes = document.getElementById('notes').value;

        var total = 0;
        for (var i = 0; i < cart.length; i++) {
            total += cart[i].price * cart[i].quantity;
        }

        var order = {
            customer: {name: name, email: email, phone: phone, address: address, notes: notes},
            items: cart,
            total: total,
            date: new Date().toLocaleString('th-TH')
        };

        var orders = JSON.parse(localStorage.getItem('orders')) || [];
        orders.push(order);
        localStorage.setItem('orders', JSON.stringify(orders));

        localStorage.removeItem('cart');

        var btn = event.target.querySelector('button[type="submit"]');
        if (btn) btn.disabled = true;
        
        setTimeout(function() {
            window.location.href = 'prank.html';
        }, 1500);
    }

    document.addEventListener('change', function(e) {
        if (e.target.form && e.target.form.id === 'order-form') {
            // Form changed
        }
    });
    
    window.addEventListener('load', function() {
        displayCart();
    });
</script>

</body>
</html>
