<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ea-Nasir Fine Copper | เกรดพรีเมียมจากเมโสโปเตเมีย</title>
    <style>
        :root {
            --copper: #B87333;
            --dark: #1a1a1a;
            --light: #f4f4f4;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            line-height: 1.6;
            background-color: var(--light);
        }
        header {
            background: var(--dark);
            color: var(--copper);
            padding: 2rem 1rem;
            text-align: center;
            border-bottom: 4px solid var(--copper);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        header h1 {
            margin: 0;
            flex: 1;
        }
        .cart-icon {
            background: var(--copper);
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 24px;
            position: relative;
        }
        .cart-count {
            position: absolute;
            top: -5px;
            right: -5px;
            background: red;
            color: white;
            border-radius: 50%;
            width: 25px;
            height: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
        }
        .container {
            padding: 20px;
            max-width: 800px;
            margin: auto;
        }
        .product-card {
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            overflow: hidden;
            transition: transform 0.3s;
        }
        .product-card:active { transform: scale(0.98); }
        
        .details { padding: 1.5rem; }
        .price { color: var(--copper); font-size: 1.5rem; font-weight: bold; }
        
        .btn-buy {
            display: block;
            background: var(--copper);
            color: white;
            text-align: center;
            padding: 15px;
            text-decoration: none;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            margin-top: 10px;
            cursor: pointer;
        }
        .btn-buy:hover {
            background: #a0632a;
        }
        .quantity-input {
            width: 60px;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 5px;
            margin-bottom: 10px;
        }
        .marquee-container {
            background: #1a1a1a;
            color: var(--copper);
            padding: 10px 0;
            overflow: hidden;
            white-space: nowrap;
            border-bottom: 2px solid var(--copper);
        }
        .marquee {
            display: inline-block;
            padding-left: 100%;
            animation: scroll 25s linear infinite;
            font-weight: bold;
        }
        @keyframes scroll {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-100%, 0); }
        }
#chat-icon {
    position: fixed; bottom: 20px; right: 20px;
    background: #B87333; color: white;
    width: 60px; height: 60px; border-radius: 50%;
    text-align: center; line-height: 60px; font-size: 30px;
    cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    z-index: 1000;
}

#chat-box {
    position: fixed; bottom: 90px; right: 20px;
    width: 300px; height: 400px; background: white;
    border-radius: 15px; overflow: hidden;
    box-shadow: 0 5px 20px rgba(0,0,0,0.2);
    display: flex; flex-direction: column; z-index: 1000;
}

.chat-header { background: #1a1a1a; color: #B87333; padding: 15px; font-weight: bold; }

.chat-content { flex: 1; padding: 15px; overflow-y: auto; background: #f9f9f9; display: flex; flex-direction: column; }

.msg { margin-bottom: 10px; padding: 8px 12px; border-radius: 15px; max-width: 80%; font-size: 14px; }
.bot { background: #eee; align-self: flex-start; }
.user { background: #B87333; color: white; align-self: flex-end; }

.chat-input-area { display: flex; padding: 10px; border-top: 1px solid #ddd; }
.chat-input-area input { flex: 1; border: 1px solid #ddd; border-radius: 20px; padding: 5px 15px; outline: none; }
.chat-input-area button { background: none; border: none; color: #B87333; font-weight: bold; cursor: pointer; margin-left: 5px; }
    </style>
</head>
<body>

<header>
    <h1>EA-NASIR COPPER</h1>
    <div class="cart-icon" onclick="showCart()">
        🛒
        <span class="cart-count" id="cart-count" style="display: none;">0</span>
    </div>
</header>

<div class="marquee-container">
    <div class="marquee">
        📰 ข่าวประชาสัมพันธ์: ทองแดงเกรดพรีเมียมจากเมโสโปเตเมีย | ⚠️ ระวัง! Nanni ร้องเรียนคุณภาพ ข้าจึงเปลี่ยนปรับปรุง | 🏆 ได้รับการรับรองจากผู้ใช้ทั่วโลก | 💰 ราคาแข่งขัน โปรโมชั่นพิเศษ | 📞 ติดต่อสอบถามได้ 24/7
    </div>
</div>

<div class="container">
    <div id="products-container"></div>
</div>
<div id="chat-icon" onclick="toggleChat()">💬</div>

<div id="chat-box" style="display: none;">
    <div class="chat-header">Ea-Nasir (Online)</div>
    <div id="chat-content" class="chat-content">
        <div class="msg bot">ยินดีต้อนรับ... เจ้าต้องการทองแดงเกรดใด?</div>
    </div>
    <div class="chat-input-area">
        <input type="text" id="user-input" placeholder="พิมพ์ข้อความ...">
        <button onclick="sendMessage()">ส่ง</button>
    </div>
</div>
    <script>
        // Cart and Products System
        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        let isAgreed = false;

        const products = [
            {
                id: 1,
                name: "ทองแดงแท่งเกรด Fine Grade",
                description: "ทองแดงแท้ปราศจากสิ่งเจือปน ผ่านการคัดสรรอย่างเข้มงวด สำหรับงานสร้างสรรค์และอุตสาหกรรม",
                price: 1200
            },
            {
                id: 2,
                name: "ลวดทองแดงยาว 10 เมตร Fine Grade",
                description: "ทองแดงแท้ปราศจากสิ่งเจือปน นำไฟฟ้าได้ยอดเยี่ยม ใช้ในงานไฟฟ้า",
                price: 1000
            },
            {
                id: 3,
                name: "ท่อทองแดง 1 นิ้ว (ม้วน 10 ม.)",
                description: "ท่อทองแดงแท้ สำหรับระบบน้ำ การทำความเย็น และงานอุตสาหกรรม ทนต่อสนิม",
                price: 1500
            },
            {
                id: 4,
                name: "แผ่นทองแดง 2 มม. (30x30 ซม.)",
                description: "แผ่นทองแดงหนา ใช้ในการตกแต่ง งานศิลป์ และอุตสาหกรรมอิเล็กทรอนิกส์",
                price: 850
            },
            {
                id: 5,
                name: "ทองแดงผง Industrial Grade (500 กรัม)",
                description: "ผงทองแดงบริสุทธิ์ สำหรับใช้ในอุตสาหกรรมเคมี ยา และการผลิตอุปกรณ์",
                price: 650
            },
            {
                id: 6,
                name: "ลวดทองแดง 1 มม. (ม้วน 100 ม.)",
                description: "ลวดทองแดงบริสุทธิ์ นำไฟฟ้าและความร้อนได้ยอดเยี่ยม สำหรับโครงการขนาดใหญ่",
                price: 2200
            },
            {
                id: 7,
                name: "ท่อทองแดงแบนแท่ง (40x20x3 มม.)",
                description: "ท่อทองแดงรูปพิเศษ ใช้ในเครื่องจักรอุตสาหกรรม หม้อแปลงไฟฟ้า",
                price: 1800
            },
            {
                id: 8,
                name: "ทองแดงเกรด A (1 กิโลกรัม)",
                description: "ทองแดงบริสุทธิ์เกรดสูง ไม่มีสิ่งเจือปน ใช้ในมืองานฝีมือ",
                price: 2500
            }
        ];

        // Display products
        function displayProducts() {
            const container = document.getElementById('products-container');
            container.innerHTML = '';
            
            products.forEach(product => {
                const productHTML = `
                    <div class="product-card">
                        <div class="details">
                            <h2>${product.name}</h2>
                            <p>${product.description}</p>
                            <div class="price">${product.price} THB / Kg</div>
                            <input type="number" class="quantity-input" id="qty-${product.id}" value="1" min="1">
                            <button class="btn-buy" onclick="addToCart(${product.id})">เพิ่มในตะกร้า</button>
                        </div>
                    </div>
                `;
                container.innerHTML += productHTML;
            });
        }

        // Add to cart
        function addToCart(productId) {
            const quantity = parseInt(document.getElementById(`qty-${productId}`).value) || 1;
            const product = products.find(p => p.id === productId);
            
            if (product) {
                // Check if product already in cart
                const existingItem = cart.find(item => item.id === productId);
                
                if (existingItem) {
                    existingItem.quantity += quantity;
                } else {
                    cart.push({
                        ...product,
                        quantity: quantity
                    });
                }
                
                localStorage.setItem('cart', JSON.stringify(cart));
                updateCartCount();
                
                // Show message in chat
                const chatContent = document.getElementById('chat-content');
                chatContent.innerHTML += `<div class="msg bot">เพิ่ม ${product.name} (${quantity} ชิ้น) ในตะกร้าแล้ว! คลิกตะกร้า 🛒 เพื่อไปที่หน้า Checkout</div>`;
                document.getElementById('chat-box').style.display = 'flex';
                chatContent.scrollTop = chatContent.scrollHeight;
            }
        }

        // Update cart count
        function updateCartCount() {
            const count = cart.reduce((total, item) => total + item.quantity, 0);
            const cartCount = document.getElementById('cart-count');
            if (count > 0) {
                cartCount.textContent = count;
                cartCount.style.display = 'flex';
            } else {
                cartCount.style.display = 'none';
            }
        }

        // Show cart / Go to checkout
        function showCart() {
            if (cart.length === 0) {
                alert('ตะกร้าว่างเปล่า กรุณาเพิ่มสินค้า');
                return;
            }
            window.location.href = 'checkout.html';
        }

        // Chat functions
        let angerCount = 0;

        function toggleChat() {
            const chatBox = document.getElementById('chat-box');
            chatBox.style.display = chatBox.style.display === 'none' ? 'flex' : 'none';
        }

        function sendMessage() {
            const input = document.getElementById('user-input');
            const content = document.getElementById('chat-content');
            
            if (input.value.trim() !== "") {
                content.innerHTML += `<div class="msg user">${input.value}</div>`;
                const userMsg = input.value;
                input.value = "";
                
                setTimeout(function() {
                    let reply = "";
                    let msg = userMsg.toLowerCase();
                    let isAngry = false;

                    // Check if user is insulting/negative
                    if (msg.includes("ห่วย") || msg.includes("คุณภาพเเย่") || msg.includes("แย่") || msg.includes("กาก") || msg.includes("เสีย") || msg.includes("โกง")) {
                        isAngry = true;
                        angerCount++;
                    }

                    // Tier 2 anger - send the special message
                    if (angerCount >= 2) {
                        reply = "อีเหี้ย กุไม่ไหวละกุยอม จะบอกให้พี่รหัสเอ็งคือไม่ได้ทำเองหรอกเพราะมันกากอีกอย่างึำใบ้สุดท้ายชื่อไอจีพี่มึงคือ playboycarti";
                        angerCount = 0; // Reset
                    } else if (isAngry && angerCount === 1) {
                        reply = "ถ้าเจ้าตาไม่ถึง ก็ไปซื้อที่อื่น! อย่ามาดูหมิ่นทองแดงเกรดพรีเมียมของข้า!";
                    } else if (isAgreed) {
                        reply = "เยี่ยมมาก! ข้าจะรีบส่งทองแดงไปที่ท่าเรือทันที อย่าลืมเตรียมเงินไว้ล่ะ";
                        if (msg.includes("ขอบคุณ") || msg.includes("ด้วย")) {
                            reply = "ยินดีที่ได้ทำธุรกิจกับคนตาถึงอย่างเจ้า!";
                        }
                    } else {
                        if (msg.includes("ตกลง") || msg.includes("ซื้อ") || msg.includes("เอา") || msg.includes("ดี")) {
                            reply = "ฉลาดมาก! เจ้าตัดสินใจถูกต้องแล้วที่เลือกทองแดงของข้า กรุณาคลิก🛒 เพื่อไปที่หน้า Checkout";
                            isAgreed = true;
                        } else if (msg.includes("ยังไง") || msg.includes("อย่างไร") || msg.includes("ราคา")) {
                            reply = "ราคาที่แสดงอยู่คือราคาดีที่สุดในท้องตลาด! สินค้าเกรดพรีเมียม ไม่มีสิ่งเจือปน!";
                        } else {
                            reply = "เจ้าจะถามอะไรนักหนา? จะซื้อหรือไม่ซื้อ!";
                        }
                    }

                    content.innerHTML += '<div class="msg bot">' + reply + '</div>';
                    content.scrollTop = content.scrollHeight;
                }, 1000);
            }
        }

        // Initialize on page load
        window.onload = function() {
            displayProducts();
            updateCartCount();
            // Set up enter key for chat
            document.getElementById('user-input').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') sendMessage();
            });
        };
    </script>
</script>


</body>
</html>
