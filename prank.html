<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Confirmed - Redirecting...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #000;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        .container {
            text-align: center;
            color: white;
        }
        h1 {
            font-size: 32px;
            margin-bottom: 20px;
        }
        p {
            font-size: 18px;
            margin-bottom: 30px;
            color: #ccc;
        }
        .spinner {
            border: 4px solid #444;
            border-top: 4px solid #ffd700;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>ไปหน้าชำระเงิน</h1>
    <p>Redirecting in 3 seconds...</p>
    <div class="spinner"></div>
</div>

<script>
    // Redirect to Epic of Gilgamesh video starting at 1:00
    setTimeout(function() {
        window.location.href = 'https://youtu.be/QUcTsFe1PVs?si=KJcZ_WtepWUAyK9w&t=60';
    }, 3000);
</script>

</body>
</html>
